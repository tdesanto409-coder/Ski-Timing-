<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ski Race Timing</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --ice:    #e8f4fd;
    --snow:   #f7fbff;
    --mid:    #b8d4eb;
    --steel:  #4a7fa5;
    --deep:   #1a3a52;
    --dark:   #0d2035;
    --accent: #ff4d1c;
    --gold:   #f5c842;
    --green:  #2ecc71;
    --mono:   'Share Tech Mono', monospace;
    --head:   'Barlow Condensed', sans-serif;
    --body:   'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--ice);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74,127,165,0.25) 0%, transparent 70%),
      repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.015) 40px,
        rgba(255,255,255,0.015) 41px
      );
    pointer-events: none;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── HEADER ── */
  header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 28px 0 24px;
    border-bottom: 1px solid rgba(184,212,235,0.15);
    margin-bottom: 32px;
  }

  .logo {
    font-family: var(--head);
    font-weight: 900;
    font-size: clamp(28px, 5vw, 46px);
    letter-spacing: -0.5px;
    text-transform: uppercase;
    line-height: 1;
  }
  .logo span { color: var(--accent); }

  .header-meta {
    text-align: center;
  }
  .header-meta .race-date {
    font-family: var(--head);
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 4px;
  }
  .header-meta .race-title {
    font-family: var(--head);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ice);
  }

  .live-badge {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    font-family: var(--head);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(1.3); }
  }
  .live-badge.stale { color: var(--mid); }
  .live-badge.stale .live-dot { background: var(--mid); animation: none; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 28px;
  }
  .stat {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(184,212,235,0.1);
    padding: 14px 18px;
    border-radius: 4px;
  }
  .stat-label {
    font-family: var(--head);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--head);
    font-weight: 700;
    font-size: 28px;
    color: var(--ice);
    line-height: 1;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(184,212,235,0.1);
    border-radius: 6px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-family: var(--head);
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
    padding: 12px 16px;
    text-align: left;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(184,212,235,0.1);
    white-space: nowrap;
  }
  thead th.num { text-align: center; }

  tbody tr {
    border-bottom: 1px solid rgba(184,212,235,0.06);
    transition: background 0.15s;
    animation: rowIn 0.4s ease both;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  tbody tr:hover { background: rgba(74,127,165,0.08); }
  tbody tr.rank-1 { background: rgba(245,200,66,0.06); }
  tbody tr.rank-2 { background: rgba(200,200,200,0.04); }
  tbody tr.rank-3 { background: rgba(180,100,40,0.05); }

  td {
    padding: 14px 16px;
    font-size: 15px;
    vertical-align: middle;
  }

  .td-rank {
    text-align: center;
    width: 52px;
  }
  .rank-medal {
    font-family: var(--head);
    font-weight: 900;
    font-size: 20px;
  }
  .rank-1 .rank-medal { color: var(--gold); }
  .rank-2 .rank-medal { color: #c0c0c0; }
  .rank-3 .rank-medal { color: #cd7f32; }
  .rank-num {
    font-family: var(--head);
    font-weight: 700;
    font-size: 16px;
    color: var(--mid);
  }

  .td-bib {
    width: 60px;
    text-align: center;
  }
  .bib-num {
    display: inline-block;
    background: var(--steel);
    color: white;
    font-family: var(--head);
    font-weight: 700;
    font-size: 14px;
    width: 32px; height: 32px;
    line-height: 32px;
    text-align: center;
    border-radius: 4px;
  }

  .td-name .name {
    font-family: var(--head);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .td-best {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 400;
    color: var(--ice);
    letter-spacing: 1px;
  }
  .rank-1 .td-best { color: var(--gold); }

  .td-runs { width: 320px; }
  .runs-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .run-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(184,212,235,0.15);
    border-radius: 3px;
    padding: 3px 8px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--mid);
    white-space: nowrap;
  }
  .run-chip.best-run {
    border-color: rgba(245,200,66,0.4);
    color: var(--ice);
  }
  .run-chip .split {
    color: rgba(184,212,235,0.5);
    font-size: 11px;
    margin-left: 4px;
  }
  .run-chip.dnf { opacity: 0.4; font-style: italic; }

  .td-count {
    text-align: center;
    font-family: var(--head);
    font-weight: 700;
    font-size: 20px;
    color: var(--steel);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--mid);
  }
  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .empty-title {
    font-family: var(--head);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .empty-sub {
    font-size: 14px;
    opacity: 0.6;
  }

  /* ── UPDATED TICKER ── */
  .ticker {
    text-align: right;
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(184,212,235,0.35);
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    header { grid-template-columns: 1fr 1fr; gap: 12px; }
    .header-meta { grid-column: 1/-1; order: -1; text-align: left; }
    .td-runs, thead th:nth-child(5) { display: none; }
    .stats-bar { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">⛷ Race<span>Time</span></div>
    <div class="header-meta">
      <div class="race-date" id="raceDate">—</div>
      <div class="race-title">Training Session</div>
    </div>
    <div class="live-badge" id="liveBadge">
      <div class="live-dot"></div>
      <span>Live</span>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Athletes</div>
      <div class="stat-value" id="statAthletes">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Runs Today</div>
      <div class="stat-value" id="statRuns">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best Time</div>
      <div class="stat-value" id="statBest" style="font-size:20px;line-height:1.4">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Last Updated</div>
      <div class="stat-value" id="statUpdated" style="font-size:18px;line-height:1.4">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table id="resultsTable">
      <thead>
        <tr>
          <th class="num">Rank</th>
          <th class="num">Bib</th>
          <th>Athlete</th>
          <th>Best Time</th>
          <th>All Runs</th>
          <th class="num">Runs</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🎿</div>
      <div class="empty-title">Waiting for first run</div>
      <div class="empty-sub">Results will appear here as athletes finish</div>
    </div>
  </div>

  <div class="ticker" id="ticker">Connecting to timing system…</div>

</div>

<script>
let lastData = null;
let lastUpdate = Date.now();

async function fetchResults() {
  try {
    const r = await fetch('results.json?t=' + Date.now());
    if (!r.ok) return;
    const data = await r.json();
    if (JSON.stringify(data) !== JSON.stringify(lastData)) {
      lastData = data;
      lastUpdate = Date.now();
      render(data);
    }
    updateLiveBadge(true);
  } catch(e) {
    updateLiveBadge(false);
  }
}

function updateLiveBadge(ok) {
  const badge = document.getElementById('liveBadge');
  const stale = (Date.now() - lastUpdate) > 30000;
  badge.className = 'live-badge' + (stale ? ' stale' : '');
  badge.querySelector('span').textContent = stale ? 'Waiting…' : 'Live';
}

function fmt(t) {
  if (!t) return '—';
  // Format: ensure it looks like M:SS.mmm
  return t.replace(/^0:/, '').padStart(1,'');
}

function render(data) {
  document.getElementById('raceDate').textContent = data.date || '';
  document.getElementById('ticker').textContent = 'Last update: ' + (data.updated || '—');
  document.getElementById('statUpdated').textContent = data.updated || '—';

  const athletes = Object.values(data.athletes || {});

  if (!athletes.length) {
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('resultsTable').querySelector('thead').style.display = 'none';
    document.getElementById('statAthletes').textContent = '0';
    document.getElementById('statRuns').textContent = '0';
    document.getElementById('statBest').textContent = '—';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsTable').querySelector('thead').style.display = '';

  // Sort by best time ascending; no-best goes last
  athletes.sort((a,b) => {
    if (a.best_seconds == null && b.best_seconds == null) return 0;
    if (a.best_seconds == null) return 1;
    if (b.best_seconds == null) return -1;
    return a.best_seconds - b.best_seconds;
  });

  const totalRuns = athletes.reduce((s,a) => s + (a.runs||[]).filter(r=>r.finish).length, 0);
  document.getElementById('statAthletes').textContent = athletes.length;
  document.getElementById('statRuns').textContent = totalRuns;
  const leader = athletes.find(a => a.best);
  document.getElementById('statBest').textContent = leader
    ? (leader.name.split(' ')[0] + '  ' + fmt(leader.best))
    : '—';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = athletes.map((a, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const rankDisplay = rank === 1 ? '<span class="rank-medal">①</span>'
                      : rank === 2 ? '<span class="rank-medal">②</span>'
                      : rank === 3 ? '<span class="rank-medal">③</span>'
                      : `<span class="rank-num">${rank}</span>`;

    const runs = (a.runs || []).filter(r => r.finish || r.splits?.length);
    const runChips = runs.map(run => {
      const isBest = run.time === a.best;
      const splits = (run.splits || []).map(s => `<span class="split">↑${fmt(s.time)}</span>`).join('');
      if (run.finish) {
        return `<div class="run-chip${isBest?' best-run':''}">${fmt(run.time)}${splits}</div>`;
      }
      return `<div class="run-chip dnf">in progress${splits}</div>`;
    }).join('');

    const finishedRuns = (a.runs||[]).filter(r=>r.finish).length;

    return `<tr class="${rankClass}" style="animation-delay:${i*40}ms">
      <td class="td-rank">${rankDisplay}</td>
      <td class="td-bib"><span class="bib-num">${a.bib}</span></td>
      <td class="td-name"><div class="name">${a.name}</div></td>
      <td class="td-best">${fmt(a.best)}</td>
      <td class="td-runs"><div class="runs-list">${runChips || '<span style="opacity:.3;font-size:13px">No runs yet</span>'}</div></td>
      <td class="td-count">${finishedRuns}</td>
    </tr>`;
  }).join('');
}

// Poll every 2 seconds
fetchResults();
setInterval(fetchResults, 2000);
setInterval(updateLiveBadge, 5000);
</script>
</body>
</html>
